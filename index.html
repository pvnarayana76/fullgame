<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshar Lab - Word Builder</title>
    <style>
        :root {
            --vyanjan-color: #3498db;
            --matra-color: #f1c40f;
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Arial', sans-serif; background-color: var(--bg-color); text-align: center; margin: 0; padding: 20px; }
        
        /* Layout Sections */
        .game-container { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 900px; margin: auto; }

        /* Resource Mixers */
        .mixer-container { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .mixer { border: 3px solid #ccc; border-radius: 10px; padding: 15px; background: white; min-width: 250px; }
        .mixer h3 { margin-top: 0; font-size: 1.1em; color: #555; }
        .mix-box { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 60px; }

        /* Interaction Zone */
        #target-image { width: 150px; height: 150px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        
        .word-tray { display: flex; gap: 15px; margin: 20px 0; }
        .drop-zone { width: 70px; height: 70px; border: 3px dashed #bdc3c7; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2em; background: #fff; transition: 0.3s; }
        .drop-zone.correct { border-style: solid; border-color: #2ecc71; background: #e8f8f5; }

        /* Draggable Items */
        .tile { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; cursor: grab; font-size: 1.8em; font-weight: bold; color: white; border-radius: 8px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: transform 0.1s; }
        .tile:active { transform: translateY(4px); box-shadow: none; }
        .vyanjan { background-color: var(--vyanjan-color); }
        .matra { background-color: var(--matra-color); color: #2c3e50; }

        /* Final Result */
        #final-word { font-size: 3.5em; height: 1.2em; color: #2ecc71; font-weight: bold; margin-top: 20px; opacity: 0; transition: opacity 0.5s; }
        #final-word.show { opacity: 1; }
    </style>
</head>
<body>

    <h1>Hindi Akshar Lab</h1>

    <div class="game-container">
        <div id="image-area">
            <img id="target-image" src="https://img.icons8.com/color/160/banana.png" alt="Kela">
            <p>What is this? Build the word!</p>
        </div>

        <div class="word-tray" id="tray">
            </div>

        <div id="final-word">केला</div>

        <hr style="width: 100%; border: 1px solid #ddd;">

        <div class="mixer-container">
            <div class="mixer">
                <h3>Vyanjan Mixer</h3>
                <div class="mix-box" id="vyanjan-mixer"></div>
            </div>
            <div class="mixer">
                <h3>Matra Mixer</h3>
                <div class="mix-box" id="matra-mixer"></div>
            </div>
        </div>
    </div>

    <script>
        const currentWordData = {
            fullWord: "केला",
            parts: ["क", "े", "ल", "ा"],
            poolVyanjan: ["क", "ल", "म", "न", "प"],
            poolMatra: ["ा", "े", "ि", "ु"]
        };

        let correctCount = 0;

        function initGame() {
            const tray = document.getElementById('tray');
            const vMixer = document.getElementById('vyanjan-mixer');
            const mMixer = document.getElementById('matra-mixer');

            // 1. Create Tray Boxes
            currentWordData.parts.forEach((char, index) => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.dataset.answer = char;
                zone.id = `slot-${index}`;
                zone.addEventListener('dragover', e => e.preventDefault());
                zone.addEventListener('drop', handleDrop);
                tray.appendChild(zone);
            });

            // 2. Populate Vyanjan Mixer
            currentWordData.poolVyanjan.sort(() => Math.random() - 0.5).forEach(char => {
                createTile(char, 'vyanjan', vMixer);
            });

            // 3. Populate Matra Mixer
            currentWordData.poolMatra.sort(() => Math.random() - 0.5).forEach(char => {
                createTile(char, 'matra', mMixer);
            });
        }

        function createTile(char, type, parent) {
            const tile = document.createElement('div');
            tile.className = `tile ${type}`;
            tile.textContent = char;
            tile.draggable = true;
            tile.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text', char);
            });
            parent.appendChild(tile);
        }

        function handleDrop(e) {
            const draggedData = e.dataTransfer.getData('text');
            const target = e.target;

            if (target.dataset.answer === draggedData && !target.classList.contains('correct')) {
                target.textContent = draggedData;
                target.classList.add('correct');
                correctCount++;
                checkWin();
            } else {
                // Shake effect or feedback could go here
                target.style.backgroundColor = "#ff7675";
                setTimeout(() => target.style.backgroundColor = "", 300);
            }
        }

        function checkWin() {
            if (correctCount === currentWordData.parts.length) {
                document.getElementById('final-word').classList.add('show');
            }
        }

        initGame();
    </script>
</body>
</html>
